<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أسامة | Oussama Art</title>
    
    <link rel="icon" type="image/jpg" href="image.jpg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية شعاعية تعطي عمقاً للمكان */
            background: radial-gradient(circle at center, #2c5364 0%, #203a43 50%, #0f2027 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        header { padding: 50px 20px; }

        .insta-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 15px;
        }

        .gallery-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 40px;
        }

        .gallery-item {
            /* عرض الصور ليكون 4 في الصف الواحد على الشاشات الكبيرة */
            width: calc(25% - 25px);
            height: 300px;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            /* إطار اللوحة */
            border: 6px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        /* تأثير تظليل الخلفية وتكبير الصورة المحددة */
        .gallery-container:hover .gallery-item:not(:hover) {
            filter: brightness(0.3) blur(3px);
            transform: scale(0.9);
        }

        .gallery-item:hover {
            transform: scale(1.15) rotate(3deg); /* تكبير أكثر قليلاً وإمالة */
            z-index: 10;
            border-color: #ff4bb4;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* تنسيق للجوال والتابلت */
        @media (max-width: 1024px) { .gallery-item { width: calc(33.33% - 25px); } }
        @media (max-width: 768px) { .gallery-item { width: calc(50% - 25px); } }
        @media (max-width: 480px) { .gallery-item { width: 100%; } }

        footer {
            background: rgba(0,0,0,0.8);
            padding: 30px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎨 OUSSAMA ART</h1>
        <p>مرحباً بكم في معرضي الشخصي </p>
        <a href="https://www.instagram.com/l_ouss_d?igsh=MTYyb3V3ZmhpbjM1cw%3D%3D&utm_source=qr" target="_blank" class="insta-link">
            <i class="fab fa-instagram"></i> تابعني على إنستقرام
        </a>
    </header>

    <div class="gallery-container">
        <div class="gallery-item"><img src="image1.jpg" alt="رسمة 1"></div>
        <div class="gallery-item"><img src="image2.jpg" alt="رسمة 2"></div>
        <div class="gallery-item"><img src="image3.jpg" alt="رسمة 3"></div>
        <div class="gallery-item"><img src="image4.jpg" alt="رسمة 4"></div>
        <div class="gallery-item"><img src="image5.jpg" alt="رسمة 5"></div>
        <div class="gallery-item"><img src="image6.jpg" alt="رسمة 6"></div>
        <div class="gallery-item"><img src="image7.jpg" alt="رسمة 7"></div>
        <div class="gallery-item"><img src="image8.jpg" alt="رسمة 8"></div>
        <div class="gallery-item"><img src="image9.jpg" alt="رسمة 9"></div>
        <div class="gallery-item"><img src="image10.jpg" alt="رسمة 10"></div>
        <div class="gallery-item"><img src="image11.jpg" alt="رسمة 11"></div>
        <div class="gallery-item"><img src="image12.jpg" alt="رسمة 12"></div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - الفنان أسامة</p>
    </footer>

</body>
</html>
